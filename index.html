<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grass Gifts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1a2a4a 0%, #0a1122 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Эффект легких звезд на фоне */
        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .main-container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 20px;
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        .btn-join {
            background-color: #A9D1F7; /* Светло-голубой как на скрине */
            color: #2F69B1; /* Темно-синий текст */
            transition: transform 0.1s ease;
        }

        .btn-join:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div class="main-container">
        <div class="mb-6 logo-glow">
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10L15 35V65L50 90L85 65V35L50 10ZM50 30L70 45V55L50 70L30 55V45L50 30Z" fill="white"/>
                <path d="M50 40L60 48V52L50 60L40 52V48L50 40Z" fill="white"/>
            </svg>
        </div>

        <h1 class="text-2xl font-extrabold tracking-wider uppercase mb-4">
            GRASS GIFTS
        </h1>

        <div class="w-64 h-1 bg-blue-500 rounded-full mb-6 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>

        <p class="text-gray-400 text-sm font-medium">
            Проект в разработке.
        </p>
    </div>

    <div class="p-8 w-full">
        <button class="btn-join w-full py-5 rounded-[24px] font-bold text-lg shadow-lg">
            Присоединиться к разработке
        </button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на все окно
        tg.ready();

        // Настройка цветов темы Telegram (опционально)
        tg.setHeaderColor('#1a2a4a');
    </script>
</body>
</html>
